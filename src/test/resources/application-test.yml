# Integration tests: no SMTP; profile bootstrap uses a closed port (failures are tolerated).
# Redis is excluded so Testcontainers runs without a Redis container (in-memory revocation store).
spring:
  mail:
    host:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.DataRedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.DataRedisRepositoriesAutoConfiguration

snow:
  auth:
    user-service-url: http://127.0.0.1:1
