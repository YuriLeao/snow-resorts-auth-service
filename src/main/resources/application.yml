spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/snow_resorts?currentSchema=auth}
    username: ${DB_USER:snow}
    password: ${DB_PASSWORD:snow}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: auth
    default-schema: auth
    create-schemas: true
    locations: classpath:db/migration
  # SMTP is optional. When spring.mail.host is unset, password-reset tokens are logged instead of emailed.
  # Env vars: MAIL_HOST, MAIL_PORT, MAIL_USERNAME (also used as From when set).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:noreply@snow-resorts.local}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

snow:
  auth:
    issuer: ${JWT_ISSUER:https://auth.snow-resorts.local}
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    password-reset-ttl: 1h
    key-id: snow-auth-key
    # Frontend or deep-link page that collects the new password and POSTs to /auth/reset-password.
    password-reset-base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:8080/reset-password}
    user-service-url: ${USER_SERVICE_URL:http://localhost:8082}
    internal-api-secret: ${INTERNAL_API_SECRET:dev-internal-secret}
  # auth-service issues tokens; it does not run the shared resource-server chain.
  security:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.snowresorts.auth: INFO
