spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/snow_resorts?currentSchema=auth}
    username: ${DB_USER:snow}
    password: ${DB_PASSWORD:snow}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: auth
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: auth
    default-schema: auth
    create-schemas: true
    locations: classpath:db/migration
  # SMTP is optional. When spring.mail.host is unset, password-reset tokens are logged instead of emailed.
  # Env vars: MAIL_HOST, MAIL_PORT, MAIL_USERNAME (also used as From when set).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:noreply@snow-resorts.local}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # Template-only Redis usage; avoid Spring Data Redis scanning JPA repos.
      repositories:
        enabled: false

server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework

snow:
  auth:
    issuer: ${JWT_ISSUER:https://auth.snow-resorts.local}
    audience: ${JWT_AUDIENCE:snow-resorts-api}
    access-token-ttl: 15m
    refresh-token-ttl: 30d
    password-reset-ttl: 1h
    key-id: snow-auth-key
    # PKCS#8 PEM or dual-key JSON {currentPem,currentKid,previousPem,previousKid}.
    # Local/test generate an ephemeral key when unset.
    signing-key-pem: ${JWT_SECRET:}
    previous-signing-key-pem: ${JWT_PREVIOUS_SECRET:}
    previous-key-id: ${JWT_PREVIOUS_KEY_ID:snow-auth-key-previous}
    # Base URL for the reset link in e-mails. Local: http://localhost:8080/reset-password (nginx → app deep link).
    # Override via PASSWORD_RESET_BASE_URL (e.g. http://<LAN_IP>:8080/reset-password on a physical phone).
    password-reset-base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:8080/reset-password}
    user-service-url: ${USER_SERVICE_URL:http://localhost:8082}
    internal-api-secret: ${INTERNAL_API_SECRET:dev-internal-secret}
  # auth-service issues tokens; it does not run the shared resource-server chain.
  security:
    enabled: false
    cors:
      allowed-origins:
        - ${CORS_ALLOWED_ORIGIN:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.snowresorts.auth: INFO
