# Local dev profile ($0). Connects to the Docker Compose Postgres started by `make dev`.
spring:
  config:
    # Auto-load snow-resorts-auth-service/.env.local (PASSWORD_RESET_BASE_URL for physical phone).
    import: optional:file:.env.local[.properties]
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/snow_resorts?currentSchema=auth
    username: snow
    password: snow
  mail:
    host: localhost
    port: 1025
    username: noreply@snow-resorts.local

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{request_id}] %logger{36} - %msg%n"
  level:
    com.snowresorts.auth: DEBUG

snow:
  auth:
    # Celular físico: export PASSWORD_RESET_BASE_URL=http://<IP_MAC>:8080/reset-password (ver .env.local.example).
    password-reset-base-url: ${PASSWORD_RESET_BASE_URL:http://localhost:8080/reset-password}
